name: Dev Services Cron

# Scheduled runs are DISABLED. See notes below before re-enabling.
#
# WHY THE SCHEDULE WAS REMOVED
# - The previous `* * * * *` schedule is unreliable on GitHub Actions: the
#   platform enforces a 5-minute minimum interval and queues bursts of runs
#   unpredictably, so jobs never fire at the intended cadence.
# - The endpoint lives behind an ngrok-free tunnel that goes offline whenever
#   the dev machine sleeps, causing every GitHub-runner invocation to get
#   connection-refused and send a failure email.
# - Burning free-tier runner minutes on a dev/self-hosted backup cron is
#   unnecessary overhead.
#
# PRIMARY SCHEDULER
# - When the app is deployed on Vercel, Vercel Cron (vercel.json) is the
#   primary scheduler. Use this workflow only as a manual trigger or when
#   running on a non-Vercel host with a stable public URL.
#
# HOW TO RE-ENABLE
# - Uncomment the `schedule:` block below.
# - Replace the endpoint URL (APP_URL secret) with a stable, always-on public
#   URL (not an ngrok-free tunnel).
# - Recommended cadences: worker every 15 min, notifications hourly.
#
# COPY-PASTE TEMPLATE (uncomment to activate):
#
# on:
#   schedule:
#     # Worker: every 15 minutes. The endpoint is idempotent.
#     - cron: "*/15 * * * *"
#     # Notifications generator: hourly.
#     - cron: "0 * * * *"
#   workflow_dispatch:
#     inputs:
#       target:
#         description: "Which endpoint to fire"
#         required: true
#         default: worker
#         type: choice
#         options:
#           - worker
#           - notifications

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Which endpoint to fire"
        required: true
        default: worker
        type: choice
        options:
          - worker
          - notifications

jobs:
  worker:
    name: dev-services worker
    runs-on: ubuntu-latest
    if: github.event.inputs.target == 'worker'
    steps:
      - name: POST /api/dev-services/worker
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -e
          if [ -z "$APP_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "::error::APP_URL or CRON_SECRET secret missing"
            exit 1
          fi
          curl -fsS -X POST "$APP_URL/api/dev-services/worker" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            -d '{}' \
            --max-time 30

  notifications:
    name: notifications generate
    runs-on: ubuntu-latest
    if: github.event.inputs.target == 'notifications'
    steps:
      - name: POST /api/notifications/generate
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -e
          if [ -z "$APP_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "::error::APP_URL or CRON_SECRET secret missing"
            exit 1
          fi
          curl -fsS -X POST "$APP_URL/api/notifications/generate" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            -d '{}' \
            --max-time 60
