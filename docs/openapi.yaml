openapi: "3.0.3"
info:
  title: ChainThings API
  version: "0.1.0"
  description: |
    Multi-tenant application API for chat, file management, workflow automation, and integrations.
    All endpoints require Supabase session authentication via cookie.

servers:
  - url: http://localhost:3000
    description: Local development
  - url: http://localhost:3001
    description: Docker development

security:
  - cookieAuth: []

tags:
  - name: Auth
    description: Authentication endpoints
  - name: Chat
    description: AI chat with RAG-enhanced responses and optional n8n workflow generation
  - name: Files
    description: File upload and management
  - name: Items
    description: Meeting notes and business data management
  - name: Memory
    description: Per-tenant assistant memory management
  - name: Notifications
    description: AI-generated notification digests and settings
  - name: RAG
    description: Retrieval-Augmented Generation embedding pipeline
  - name: Integrations
    description: Third-party integration management
  - name: Workflows
    description: AI-powered n8n workflow generation

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: sb-localhost-auth-token
      description: Supabase session cookie (name configurable via SUPABASE_COOKIE_NAME env var)

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string

    ChatRequest:
      type: object
      required: [message]
      properties:
        message:
          type: string
          description: User message content
        conversationId:
          type: string
          format: uuid
          description: Existing conversation ID. If omitted, a new conversation is created.
        tool:
          type: string
          enum: [n8n]
          description: Optional tool mode. "n8n" enables workflow generation via chat.

    N8nResult:
      type: object
      properties:
        name:
          type: string
        n8nWorkflowId:
          type: string
          nullable: true
        status:
          type: string
          enum: [active, pending]

    ChatResponse:
      type: object
      required: [conversationId, message]
      properties:
        conversationId:
          type: string
          format: uuid
        message:
          type: string
          description: Assistant response content
        n8n:
          $ref: "#/components/schemas/N8nResult"
          nullable: true
        sources:
          type: array
          nullable: true
          description: RAG source documents referenced in the response
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              title:
                type: string
                nullable: true
              type:
                type: string
                enum: [item, conversation, memory]

    FileMetadata:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        filename:
          type: string
        storage_path:
          type: string
        content_type:
          type: string
        size_bytes:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    FileUploadResponse:
      type: object
      required: [file]
      properties:
        file:
          $ref: "#/components/schemas/FileMetadata"

    Integration:
      type: object
      properties:
        id:
          type: string
          format: uuid
        service:
          type: string
          example: hedy.ai
        label:
          type: string
        config:
          type: object
        enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    IntegrationListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Integration"

    IntegrationCreateRequest:
      type: object
      required: [service]
      properties:
        service:
          type: string
          example: hedy.ai
        label:
          type: string
        config:
          type: object

    IntegrationDeleteRequest:
      type: object
      required: [id]
      properties:
        id:
          type: string
          format: uuid

    IntegrationCreateResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/Integration"

    HedySetupResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [webhookUrl, n8nWorkflowId]
          properties:
            webhookUrl:
              type: string
              format: uri
              example: http://localhost:5678/webhook/hedy-tenant-uuid
            n8nWorkflowId:
              type: string
            active:
              type: boolean
            alreadyExists:
              type: boolean

    WorkflowGenerateRequest:
      type: object
      required: [prompt]
      properties:
        prompt:
          type: string
          description: Natural language description of the desired workflow

    WorkflowRecord:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        prompt:
          type: string
        status:
          type: string
          enum: [generating, active, pending, error]
        n8n_workflow_id:
          type: string
          nullable: true
        n8n_data:
          type: object
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    WorkflowGenerateResponse:
      type: object
      required: [workflow]
      properties:
        workflow:
          $ref: "#/components/schemas/WorkflowRecord"

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true

    Item:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        type:
          type: string
        title:
          type: string
          nullable: true
        content:
          type: string
          nullable: true
        metadata:
          type: object
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ItemCreateRequest:
      type: object
      required: [type]
      properties:
        type:
          type: string
          example: meeting_note
        title:
          type: string
        content:
          type: string
        metadata:
          type: object

    MemoryEntry:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        category:
          type: string
          enum: [task, preference, fact, project, summary]
        content:
          type: string
        importance:
          type: integer
          minimum: 1
          maximum: 10
        status:
          type: string
          enum: [active, archived, expired]
        source_type:
          type: string
          nullable: true
        source_id:
          type: string
          format: uuid
          nullable: true
        created_at:
          type: string
          format: date-time

    MemoryCreateRequest:
      type: object
      required: [category, content]
      properties:
        category:
          type: string
          enum: [task, preference, fact, project, summary]
        content:
          type: string
        importance:
          type: integer
          minimum: 1
          maximum: 10

    NotificationSettings:
      type: object
      properties:
        enabled:
          type: boolean
        frequency:
          type: string
          enum: [daily, biweekly, weekly]
        timezone:
          type: string
          example: Asia/Taipei
        send_hour_local:
          type: integer
          minimum: 0
          maximum: 23

    NotificationCache:
      type: object
      properties:
        id:
          type: string
          format: uuid
        period_start:
          type: string
          format: date
        period_end:
          type: string
          format: date
        content:
          type: object
          properties:
            summary:
              type: string
            actionItems:
              type: array
              items:
                type: object
                properties:
                  task:
                    type: string
                  priority:
                    type: string
            reminders:
              type: array
              items:
                type: string
        status:
          type: string
          enum: [generating, generated, shown, expired]
        created_at:
          type: string
          format: date-time

paths:
  /api/auth/signout:
    post:
      tags: [Auth]
      summary: Sign out current user
      description: |
        Signs out the current session and redirects to the login page.
        This endpoint does not verify authentication — any request will trigger sign-out.
      security: []
      responses:
        "302":
          description: Redirect to /login
          headers:
            Location:
              schema:
                type: string
                example: /login

  /api/chat:
    post:
      tags: [Chat]
      summary: Send a chat message
      description: |
        Send a message to the AI assistant. Optionally specify a conversation ID
        to continue an existing conversation, or omit it to start a new one.
        Set `tool: "n8n"` to enable workflow generation mode.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: Assistant response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"
        "400":
          description: Missing or invalid message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: User profile not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: AI service error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/files/upload:
    post:
      tags: [Files]
      summary: Upload a file
      description: Upload a file to tenant-isolated Supabase Storage and save metadata.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: File uploaded successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileUploadResponse"
        "400":
          description: No file provided
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: User profile not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Upload or metadata error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/integrations:
    get:
      tags: [Integrations]
      summary: List integrations
      description: Retrieve all integrations for the current tenant.
      responses:
        "200":
          description: Integration list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrationListResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: User profile not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Database error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    post:
      tags: [Integrations]
      summary: Create or update an integration
      description: |
        Upsert an integration by service name. If an integration with the same
        (tenant_id, service) exists, it will be updated.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IntegrationCreateRequest"
      responses:
        "200":
          description: Integration created/updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrationCreateResponse"
        "400":
          description: Missing service field
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: User profile not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Database error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    delete:
      tags: [Integrations]
      summary: Delete an integration
      description: |
        Delete an integration by ID. The deletion is scoped to the current
        tenant — only integrations belonging to the authenticated user's tenant can be deleted.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IntegrationDeleteRequest"
      responses:
        "200":
          description: Integration deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Missing id field
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: User profile not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Database error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/integrations/hedy/setup:
    post:
      tags: [Integrations]
      summary: Set up Hedy.ai webhook
      description: |
        Generates an n8n workflow with a webhook trigger for receiving Hedy.ai
        meeting data. The workflow transforms and stores meeting notes, summaries,
        and action items. Returns immediately if a workflow already exists.
      responses:
        "200":
          description: Webhook setup complete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HedySetupResponse"
        "400":
          description: Hedy integration not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: User profile not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: n8n API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/workflows/generate:
    post:
      tags: [Workflows]
      summary: Generate an n8n workflow from natural language
      description: |
        Uses AI to generate an n8n workflow JSON from a natural language prompt.
        The workflow is saved to the database and optionally created in n8n.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkflowGenerateRequest"
      responses:
        "200":
          description: Workflow generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowGenerateResponse"
        "400":
          description: Missing prompt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: User profile not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: AI or workflow creation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/items:
    get:
      tags: [Items]
      summary: List items
      description: Retrieve paginated items for the current tenant, optionally filtered by type.
      parameters:
        - name: type
          in: query
          schema:
            type: string
          description: Filter by item type (e.g. "meeting_note")
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: sort
          in: query
          schema:
            type: string
            default: created_at
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        "200":
          description: Paginated item list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Item"
                  pagination:
                    type: object
                    properties:
                      page:
                        type: integer
                      limit:
                        type: integer
                      total:
                        type: integer
        "401":
          description: Not authenticated
        "404":
          description: Profile not found

    post:
      tags: [Items]
      summary: Create an item
      description: Create a new item (e.g. meeting note). Automatically queues for RAG embedding.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItemCreateRequest"
      responses:
        "201":
          description: Item created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Item"
        "400":
          description: Missing type field
        "401":
          description: Not authenticated

  /api/items/extract:
    post:
      tags: [Items]
      summary: Extract key points and action items using AI
      description: |
        Uses AI to analyze item content and extract structured metadata
        (title, keyPoints, actionItems, summary). Creates memory entries
        from action items. Idempotent — re-extraction replaces old tasks.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [itemId]
              properties:
                itemId:
                  type: string
                  format: uuid
      responses:
        "200":
          description: Extraction complete
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      extracted:
                        type: object
        "401":
          description: Not authenticated
        "404":
          description: Item not found
        "502":
          description: AI service error

  /api/memory:
    get:
      tags: [Memory]
      summary: List memory entries
      description: Retrieve active memory entries for the current tenant.
      parameters:
        - name: category
          in: query
          schema:
            type: string
            enum: [task, preference, fact, project, summary]
        - name: status
          in: query
          schema:
            type: string
            default: active
      responses:
        "200":
          description: Memory entry list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/MemoryEntry"
        "401":
          description: Not authenticated

    post:
      tags: [Memory]
      summary: Create a memory entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemoryCreateRequest"
      responses:
        "201":
          description: Memory entry created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/MemoryEntry"
        "400":
          description: Missing or invalid fields
        "401":
          description: Not authenticated

    delete:
      tags: [Memory]
      summary: Archive a memory entry or clear all
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  format: uuid
                clearAll:
                  type: boolean
      responses:
        "200":
          description: Memory archived
        "400":
          description: Missing id or clearAll
        "401":
          description: Not authenticated

  /api/notifications:
    get:
      tags: [Notifications]
      summary: Get recent notifications
      description: Retrieve the latest cached notification digests.
      responses:
        "200":
          description: Notification list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/NotificationCache"
        "401":
          description: Not authenticated

    patch:
      tags: [Notifications]
      summary: Mark notification as shown
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id:
                  type: string
                  format: uuid
      responses:
        "200":
          description: Marked as shown
        "401":
          description: Not authenticated

  /api/notifications/settings:
    get:
      tags: [Notifications]
      summary: Get notification settings
      description: Returns user's notification preferences or defaults if none set.
      responses:
        "200":
          description: Notification settings
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/NotificationSettings"
        "401":
          description: Not authenticated

    put:
      tags: [Notifications]
      summary: Update notification settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationSettings"
      responses:
        "200":
          description: Settings updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/NotificationSettings"
        "400":
          description: Invalid frequency or timezone
        "401":
          description: Not authenticated

  /api/notifications/generate:
    post:
      tags: [Notifications]
      summary: Generate notification digests
      description: |
        Generates AI-powered notification digests. Supports two modes:
        - **Cron mode**: Authorization header with CRON_SECRET, generates for all eligible users
        - **User mode**: Standard auth, generates for the requesting user
      responses:
        "200":
          description: Generation complete
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      generated:
                        type: integer
        "401":
          description: Not authenticated (user mode)

  /api/rag/embed:
    post:
      tags: [RAG]
      summary: Process embedding queue
      description: |
        Processes pending RAG documents for the current tenant.
        Chunks content, generates embeddings, and stores in vector database.
      responses:
        "200":
          description: Processing complete
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      processed:
                        type: integer
                      failed:
                        type: integer
        "401":
          description: Not authenticated
