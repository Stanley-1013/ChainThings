services:
  chainthings:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        - NEXT_PUBLIC_SUPABASE_SERVER_URL=http://supabase-kong:8000
    container_name: chainthings-web
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - SUPABASE_URL=http://supabase-kong:8000
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - ZEROCLAW_GATEWAY_URL=${ZEROCLAW_GATEWAY_URL:-http://zeroclaw:42617}
      - ZEROCLAW_GATEWAY_TOKEN=${ZEROCLAW_GATEWAY_TOKEN}
      - ZEROCLAW_TIMEOUT_MS=${ZEROCLAW_TIMEOUT_MS:-30000}
      - DEFAULT_AI_PROVIDER=${DEFAULT_AI_PROVIDER:-zeroclaw}
      - OPENCLAW_GATEWAY_URL=${OPENCLAW_GATEWAY_URL:-}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-}
      - OPENCLAW_TIMEOUT_MS=${OPENCLAW_TIMEOUT_MS:-30000}
      - N8N_API_URL=http://n8n-n8n-1:5678
      - N8N_API_KEY=${N8N_API_KEY}
      - N8N_TIMEOUT_MS=${N8N_TIMEOUT_MS:-10000}
      - N8N_WEBHOOK_URL=${N8N_WEBHOOK_URL:-}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3001}
      - CHAINTHINGS_WEBHOOK_SECRET=${CHAINTHINGS_WEBHOOK_SECRET}
      - SUPABASE_COOKIE_NAME=${SUPABASE_COOKIE_NAME:-sb-localhost-auth-token}
      - CRON_SECRET=${CRON_SECRET:-}
    networks:
      default:
      lab_net:

networks:
  lab_net:
    external: true
